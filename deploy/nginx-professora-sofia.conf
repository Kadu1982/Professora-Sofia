# Proxy reverso — Professora Sofia MVP
# Copiar para: /apps/saude/nginx/conf.d/professora-sofia.conf
# Depois: docker exec saude_nginx nginx -t && docker exec saude_nginx nginx -s reload
#
# Requer DNS: sofia.axiumsistemas.cloud -> IP da VPS
# Certificado: certbot certonly --webroot -w /apps/saude/nginx/ssl/acme -d sofia.axiumsistemas.cloud

upstream professora_sofia {
    zone professora_sofia 64k;
    server 172.17.0.1:3030;
    keepalive 8;
}

server {
    listen 80;
    server_name sofia.axiumsistemas.cloud;

    location ^~ /.well-known/acme-challenge/ {
        root /etc/nginx/ssl/acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name sofia.axiumsistemas.cloud;

    access_log /var/log/nginx/professora-sofia-access.log;
    error_log /var/log/nginx/professora-sofia-error.log;

    ssl_certificate /etc/nginx/ssl/letsencrypt/live/sofia-axiumsistemas/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/letsencrypt/live/sofia-axiumsistemas/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10m;

    location / {
        proxy_pass http://professora_sofia;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
