<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório do aluno — Professora Sofia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background:#f4f7fb; color:#172033; }
    .top { background:linear-gradient(135deg,#163b78,#2563b9); color:#fff; }
    .metric { border:0; border-radius:16px; box-shadow:0 6px 20px #163b7812; }
    .metric-value { font-size:2rem; font-weight:700; }
    .evolution { border-left:5px solid #16a34a; background:#ecfdf3; }
    .session { border:0; border-radius:14px; box-shadow:0 4px 16px #163b780d; }
    .word { display:inline-block; background:#dbeafe; color:#1e40af; border-radius:99px; padding:4px 10px; margin:3px; font-size:.9rem; }
  </style>
</head>
<body>
  <header class="top py-4 mb-4">
    <div class="container">
      <div class="small opacity-75">Talk Method · acompanhamento pedagógico</div>
      <h1 class="h3 mb-1">Relatório de evolução</h1>
      <div id="aluno" class="opacity-75">Carregando...</div>
    </div>
  </header>

  <main class="container pb-5">
    <div id="erro" class="alert alert-danger d-none"></div>
    <section class="row g-3 mb-4">
      <div class="col-6 col-lg-3"><div class="card metric p-3"><div class="text-muted small">Sessões</div><div id="sessoes" class="metric-value">—</div></div></div>
      <div class="col-6 col-lg-3"><div class="card metric p-3"><div class="text-muted small">Interações</div><div id="interacoes" class="metric-value">—</div></div></div>
      <div class="col-6 col-lg-3"><div class="card metric p-3"><div class="text-muted small">Por voz</div><div id="voz" class="metric-value">—</div></div></div>
      <div class="col-6 col-lg-3"><div class="card metric p-3"><div class="text-muted small">Evolução detectada</div><div id="evolucao" class="metric-value">—</div></div></div>
    </section>

    <section id="evolution-card" class="card evolution mb-4 d-none">
      <div class="card-body">
        <h2 class="h5">Vocabulário acima do estágio atual</h2>
        <p class="mb-2">O aluno utilizou naturalmente palavras associadas ao próximo estágio. Isso é um sinal positivo de evolução.</p>
        <div id="palavras"></div>
      </div>
    </section>

    <section>
      <h2 class="h5 mb-3">Histórico das aulas</h2>
      <div id="lista"></div>
    </section>
  </main>

  <script>
    (function () {
      var alunoId = new URLSearchParams(location.search).get('alunoId');
      var erro = document.getElementById('erro');
      if (!alunoId) { erro.textContent = 'Informe o alunoId na URL.'; erro.classList.remove('d-none'); return; }
      fetch('/api/relatorio/aluno/' + encodeURIComponent(alunoId))
        .then(function (r) { return r.json().then(function (d) { if (!r.ok) throw new Error(d.erro); return d; }); })
        .then(function (d) {
          document.getElementById('aluno').textContent = d.nomeAluno + ' · ID: ' + d.alunoId;
          document.getElementById('sessoes').textContent = d.totalSessoes;
          document.getElementById('interacoes').textContent = d.totalInteracoes;
          document.getElementById('voz').textContent = d.totalInteracoesPorVoz;
          document.getElementById('evolucao').textContent = d.evolucaoDetectada ? 'Sim' : 'Ainda não';
          if (d.evolucaoDetectada) {
            document.getElementById('evolution-card').classList.remove('d-none');
            document.getElementById('palavras').innerHTML = d.palavrasAcimaDoNivel.map(function (p) { return '<span class="word">' + p + '</span>'; }).join('');
          }
          var lista = document.getElementById('lista');
          if (!d.sessoes.length) { lista.innerHTML = '<div class="alert alert-info">Ainda não há aulas registradas para este aluno.</div>'; return; }
          lista.innerHTML = d.sessoes.slice().reverse().map(function (s) {
            return '<div class="card session mb-3"><div class="card-body"><div class="d-flex justify-content-between flex-wrap gap-2"><strong>Unidade ' + (s.unidade || '—') + ' · ' + (s.estagio || '—') + '</strong><span class="text-muted small">' + new Date(s.criadoEm).toLocaleString('pt-BR') + '</span></div><div class="mt-2 text-muted small">' + s.mensagensAluno + ' interações · ' + s.interacoesPorVoz + ' por voz · ' + s.duracaoMinutos + ' min</div>' + (s.evolucaoDetectada ? '<div class="mt-2 text-success small fw-semibold">✓ Evolução detectada: ' + s.palavrasAcimaDoNivel.join(', ') + '</div>' : '') + '</div></div>';
          }).join('');
        })
        .catch(function (e) { erro.textContent = e.message || 'Não foi possível carregar o relatório.'; erro.classList.remove('d-none'); });
    }());
  </script>
</body>
</html>
